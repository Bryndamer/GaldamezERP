services:

  # ─── Base de datos MySQL ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: galdamez_mysql
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: GaldamezERP
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - galdamez_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Backend Laravel (PHP-FPM + Nginx) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: galdamez_backend
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: GaldamezERP
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_LOCALE: es
      APP_FALLBACK_LOCALE: es
      APP_FAKER_LOCALE: es_ES
      # Base de datos — usa el nombre del servicio como host
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: GaldamezERP
      DB_USERNAME: root
      DB_PASSWORD: rootpassword
      # Sesión y caché
      SESSION_DRIVER: database
      SESSION_LIFETIME: "120"
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      # CORS — el frontend corre en el host en puerto 5173
      FRONTEND_URL: http://localhost:5173
      # Filesystem
      FILESYSTEM_DISK: local
      # Logs
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
    volumes:
      # Persistir imágenes subidas entre reinicios del contenedor
      - backend_storage:/var/www/storage
    networks:
      - galdamez_network

  # ─── Frontend React (Vite dev server) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: galdamez_frontend
    ports:
      - "5173:5173"
    environment:
      # El navegador hace las peticiones desde el host, no desde dentro de Docker
      VITE_API_URL: http://localhost:8000/api
    volumes:
      # Hot reload: sincronizar src/ y public/ del host al contenedor
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      # Excluir node_modules del contenedor (usa los del build)
      - /app/node_modules
    networks:
      - galdamez_network

# ─── Volúmenes persistentes ──────────────────────────────────────────────────
volumes:
  mysql_data:
    name: galdamez_mysql_data
  backend_storage:
    name: galdamez_backend_storage

# ─── Red interna ─────────────────────────────────────────────────────────────
networks:
  galdamez_network:
    name: galdamez_network
    driver: bridge
